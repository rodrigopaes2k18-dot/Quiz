<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiz App</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --border: #2e3347;
    --accent: #5b8dee;
    --accent2: #e05b8d;
    --green: #4caf82;
    --red: #e05b5b;
    --orange: #e09b5b;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── LOGIN ── */
  #screen-login {
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #1a2340 0%, var(--bg) 60%);
    padding: 32px 20px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 36px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .app-logo {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .app-tagline {
    color: var(--text2);
    font-size: 0.85rem;
    margin-bottom: 40px;
    letter-spacing: 0.5px;
  }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-google:hover { background: #2a2e42; border-color: var(--accent); }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* ── BROWSER ── */
  #screen-browser {
    padding: 0;
    background: var(--bg);
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-title {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    flex: 1;
  }

  .btn-icon {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); }

  .breadcrumb {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: var(--accent); }
  .breadcrumb .sep { color: var(--border); }

  .file-list { padding: 8px 16px 100px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .file-item:last-child { border-bottom: none; }
  .file-item:hover { background: var(--surface2); }

  .file-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .file-icon.folder { background: rgba(91,141,238,0.15); }
  .file-icon.json { background: rgba(76,175,130,0.15); }

  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }

  .file-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .file-check.checked { background: var(--accent); border-color: var(--accent); }
  .file-check.checked::after { content: '✓'; color: white; font-size: 0.75rem; font-weight: 700; }

  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .selected-count {
    flex: 1;
    font-size: 0.85rem;
    color: var(--text2);
  }
  .selected-count strong { color: var(--accent); }

  /* ── BUTTONS ── */
  .btn {
    padding: 12px 24px;
    border-radius: var(--radius);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover:not(:disabled) { background: #4a7de0; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: #2a2e42; }
  .btn-danger { background: var(--red); color: white; }
  .btn-success { background: var(--green); color: white; }

  /* ── QUIZ SCREEN ── */
  #screen-quiz { background: var(--bg); }

  .quiz-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .hud {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .hud-chip {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    border: 1px solid;
  }
  .hud-chip.erradas { color: var(--orange); border-color: rgba(224,155,91,0.3); background: rgba(224,155,91,0.08); }
  .hud-chip.novas { color: var(--green); border-color: rgba(76,175,130,0.3); background: rgba(76,175,130,0.08); }
  .hud-chip.hoje { color: var(--red); border-color: rgba(224,91,91,0.3); background: rgba(224,91,91,0.08); }
  .hud-chip.futuras { color: var(--text2); border-color: var(--border); background: var(--surface2); }

  .quiz-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
    color: var(--text2);
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s;
  }

  .quiz-body { padding: 20px 16px 120px; }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .streak-badge.nova { background: rgba(91,141,238,0.15); color: var(--accent); }
  .streak-badge.revisao { background: rgba(224,91,91,0.15); color: var(--red); }
  .streak-badge.erro { background: rgba(224,155,91,0.15); color: var(--orange); }

  .question-text {
    font-size: 1rem;
    line-height: 1.6;
    font-weight: 500;
    margin-bottom: 24px;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .option-btn {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(91,141,238,0.08); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: var(--green); background: rgba(76,175,130,0.12); color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(224,91,91,0.12); color: var(--red); }

  .feedback-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-result { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
  .feedback-result.correct { color: var(--green); }
  .feedback-result.wrong { color: var(--red); }
  .feedback-explanation { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }
  .feedback-schedule { font-size: 0.75rem; color: var(--text2); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

  .quiz-actions {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
  }

  /* ── RESULTS ── */
  #screen-results {
    padding: 24px 16px;
    background: var(--bg);
    overflow-y: auto;
  }

  .results-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .results-score {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .results-label { font-size: 0.85rem; color: var(--text2); margin-top: 4px; }

  .error-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .error-q { font-size: 0.88rem; font-weight: 500; margin-bottom: 10px; line-height: 1.5; }
  .error-answer { font-size: 0.82rem; color: var(--green); margin-bottom: 8px; }
  .error-expl { font-size: 0.8rem; color: var(--text2); line-height: 1.5; }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
    color: var(--text2);
    font-size: 0.85rem;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 0.82rem;
    color: var(--text);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── FILTER PANEL ── */
  .filter-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .filter-row:last-child { margin-bottom: 0; }

  select, input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 8px 12px;
    flex: 1;
    min-width: 120px;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }

  .toggle-srs {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }
  .toggle-srs input { display: none; }
  .toggle-track {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    top: 3px; left: 3px;
    transition: left 0.2s;
  }
  .toggle-srs input:checked + .toggle-track { background: var(--accent); }
  .toggle-srs input:checked + .toggle-track::after { left: 19px; }

  h3.section-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin: 20px 0 10px;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }
</style>
</head>
<body>

<!-- ═══════════════ SCREEN: LOGIN ═══════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="app-logo">QUIZ</div>
    <div class="app-tagline">Central de Estudos · SRS Inteligente</div>
    <button class="btn-google" onclick="handleLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>
  </div>
</div>

<!-- ═══════════════ SCREEN: BROWSER ═══════════════ -->
<div id="screen-browser" class="screen">
  <div class="topbar">
    <button class="btn-icon" id="btn-back-browser" onclick="navigateUp()" style="display:none">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <span class="topbar-title">QUIZ</span>
    <button class="btn-icon" onclick="handleLogout()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div id="file-list-container">
    <div class="loading"><div class="spinner"></div>Carregando...</div>
  </div>

  <div class="bottom-bar">
    <span class="selected-count" id="selected-count">Nenhum arquivo selecionado</span>
    <button class="btn btn-primary" id="btn-start-session" onclick="showFilters()" disabled>Estudar</button>
  </div>
</div>

<!-- ═══════════════ SCREEN: FILTERS ═══════════════ -->
<div id="screen-filters" class="screen">
  <div class="topbar">
    <button class="btn-icon" onclick="showScreen('screen-browser')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <span class="topbar-title">Configurar Sessão</span>
  </div>

  <div style="padding: 16px 16px 100px; overflow-y: auto;">
    <h3 class="section-title">Filtros</h3>
    <div class="filter-row">
      <select id="filter-area" onchange="updateSubArea()">
        <option>Todas as Áreas</option>
      </select>
      <select id="filter-subarea">
        <option>Todas as Subáreas</option>
      </select>
    </div>
    <div class="filter-row">
      <select id="filter-nivel">
        <option>Todos os Níveis</option>
      </select>
      <input type="text" id="filter-tags" placeholder="Filtrar por tags...">
    </div>

    <h3 class="section-title">Modo de Estudo</h3>
    <label class="toggle-srs">
      <input type="checkbox" id="toggle-srs" checked>
      <div class="toggle-track"></div>
      🧠 Modo Memória (SRS Inteligente)
    </label>

    <div id="stats-preview" style="margin-top: 24px;"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-secondary" onclick="showScreen('screen-browser')" style="flex:1">Cancelar</button>
    <button class="btn btn-primary" onclick="startQuiz()" style="flex:2">Iniciar Sessão</button>
  </div>
</div>

<!-- ═══════════════ SCREEN: QUIZ ═══════════════ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="hud" id="hud"></div>
    <div class="quiz-progress">
      <span id="progress-text">0/0</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span id="score-text">0✓</span>
    </div>
  </div>

  <div class="quiz-body" id="quiz-body"></div>

  <div class="quiz-actions" id="quiz-actions"></div>
</div>

<!-- ═══════════════ SCREEN: RESULTS ═══════════════ -->
<div id="screen-results" class="screen">
  <div class="results-header">
    <div style="font-size:2rem; margin-bottom:8px">🏁</div>
    <div class="results-score" id="results-score">0%</div>
    <div class="results-label" id="results-label"></div>
  </div>
  <div id="results-errors"></div>
  <div style="display:flex; gap:10px; margin-top:24px; padding-bottom: 24px;">
    <button class="btn btn-secondary" onclick="showScreen('screen-browser')" style="flex:1">Menu</button>
    <button class="btn btn-primary" onclick="startQuiz()" style="flex:1">Repetir</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURAÇÃO — substitua pelo seu Client ID
// ═══════════════════════════════════════════════════════
const CLIENT_ID = '345044710042-armqofhvfj88b7gpaf5e0j4phvb6j7fb.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive';

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let tokenClient = null;
let accessToken = null;

// Browser state
let folderStack = []; // [{id, name}]
let selectedFiles = {}; // {fileId: {id, name, parentId}}
let allLoadedQuestions = [];

// Quiz state
let quizQueue = [];
let currentIndex = 0;
let sessionCorrect = 0;
let sessionTotal = 0;
let sessionErrors = [];
let srsMode = true;
let sessionQuestions = []; // full filtered list for HUD

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function getBrazilDate() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
}

function isoToday() {
  const d = getBrazilDate();
  return d.toISOString().split('T')[0];
}

function addDays(isoDate, days) {
  const d = new Date(isoDate + 'T12:00:00Z');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ═══════════════════════════════════════════════════════
// GOOGLE AUTH
// ═══════════════════════════════════════════════════════
function handleLogin() {
  if (!window.google) {
    showToast('⚠️ Carregando Google API...');
    setTimeout(handleLogin, 1000);
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showToast('❌ Erro no login'); return; }
      accessToken = resp.access_token;
      showScreen('screen-browser');
      loadFolder(null, 'Meu Drive');
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function handleLogout() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = null;
  selectedFiles = {};
  folderStack = [];
  showScreen('screen-login');
}

// ═══════════════════════════════════════════════════════
// DRIVE API
// ═══════════════════════════════════════════════════════
async function driveGet(url) {
  const r = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!r.ok) throw new Error(`Drive API error: ${r.status}`);
  return r.json();
}

async function driveUpdate(fileId, content) {
  const blob = new Blob([JSON.stringify(content, null, 2)], { type: 'application/json' });
  const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: blob
  });
  if (!r.ok) throw new Error(`Drive update error: ${r.status}`);
}

async function listFolder(folderId) {
  const q = folderId
    ? `'${folderId}' in parents and trashed=false`
    : `'root' in parents and trashed=false`;
  const fields = 'files(id,name,mimeType,modifiedTime,size)';
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=${encodeURIComponent(fields)}&orderBy=name&pageSize=200`;
  const data = await driveGet(url);
  return data.files || [];
}

async function readJsonFile(fileId) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!r.ok) throw new Error(`File read error: ${r.status}`);
  return r.json();
}

// ═══════════════════════════════════════════════════════
// BROWSER
// ═══════════════════════════════════════════════════════
async function loadFolder(folderId, folderName) {
  const container = document.getElementById('file-list-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando...</div>';

  if (folderId !== null || folderStack.length === 0) {
    if (folderId === null) {
      folderStack = [{ id: null, name: 'Meu Drive' }];
    } else {
      // check if already in stack (navigating back via breadcrumb)
      const idx = folderStack.findIndex(f => f.id === folderId);
      if (idx >= 0) {
        folderStack = folderStack.slice(0, idx + 1);
      } else {
        folderStack.push({ id: folderId, name: folderName });
      }
    }
  }

  renderBreadcrumb();

  const backBtn = document.getElementById('btn-back-browser');
  backBtn.style.display = folderStack.length > 1 ? 'flex' : 'none';

  try {
    const files = await listFolder(folderId);
    renderFileList(files, folderId);
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Erro ao carregar pasta.<br>${e.message}</p></div>`;
  }
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = folderStack.map((f, i) => {
    const isLast = i === folderStack.length - 1;
    const sep = i > 0 ? '<span class="sep"> / </span>' : '';
    if (isLast) return `${sep}<span style="color:var(--text)">${f.name}</span>`;
    return `${sep}<span onclick="loadFolder('${f.id}', '${f.name}')">${f.name}</span>`;
  }).join('');
}

function navigateUp() {
  if (folderStack.length <= 1) return;
  folderStack.pop();
  const prev = folderStack[folderStack.length - 1];
  loadFolder(prev.id, prev.name);
}

function renderFileList(files, currentFolderId) {
  const container = document.getElementById('file-list-container');

  const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
  const jsons = files.filter(f => f.name.endsWith('.json'));

  if (folders.length === 0 && jsons.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhuma pasta ou JSON encontrado aqui.</p></div>';
    return;
  }

  let html = '';

  if (folders.length > 0) {
    html += '<div class="file-list">';
    if (jsons.length > 0) html += '<p style="font-size:0.72rem;color:var(--text2);padding:8px 0 4px;text-transform:uppercase;letter-spacing:1px;font-weight:600">Pastas</p>';
    folders.forEach(f => {
      html += `
        <div class="file-item" onclick="loadFolder('${f.id}', '${escHtml(f.name)}')">
          <div class="file-icon folder">📁</div>
          <div class="file-info">
            <div class="file-name">${escHtml(f.name)}</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>`;
    });
    html += '</div>';
  }

  if (jsons.length > 0) {
    html += '<div class="file-list">';
    if (folders.length > 0) html += '<p style="font-size:0.72rem;color:var(--text2);padding:8px 0 4px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-left:0">Arquivos JSON</p>';

    // Select all button
    html += `<div style="display:flex;gap:8px;padding:4px 0 8px;">
      <button class="btn btn-secondary" style="font-size:0.78rem;padding:6px 14px" onclick="selectAllInFolder(${JSON.stringify(jsons).replace(/"/g, '&quot;')}, '${currentFolderId}')">Selecionar todos</button>
      <button class="btn btn-secondary" style="font-size:0.78rem;padding:6px 14px" onclick="deselectAllInFolder(${JSON.stringify(jsons.map(f=>f.id)).replace(/"/g, '&quot;')})">Desmarcar todos</button>
    </div>`;

    jsons.forEach(f => {
      const checked = selectedFiles[f.id] ? 'checked' : '';
      html += `
        <div class="file-item" onclick="toggleFile('${f.id}', '${escHtml(f.name)}', '${currentFolderId}')">
          <div class="file-icon json">📄</div>
          <div class="file-info">
            <div class="file-name">${escHtml(f.name)}</div>
          </div>
          <div class="file-check ${checked}" id="check-${f.id}"></div>
        </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
  updateSelectedCount();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleFile(fileId, fileName, folderId) {
  if (selectedFiles[fileId]) {
    delete selectedFiles[fileId];
  } else {
    selectedFiles[fileId] = { id: fileId, name: fileName, folderId };
  }
  const chk = document.getElementById(`check-${fileId}`);
  if (chk) chk.className = `file-check ${selectedFiles[fileId] ? 'checked' : ''}`;
  updateSelectedCount();
}

function selectAllInFolder(files, folderId) {
  files.forEach(f => {
    selectedFiles[f.id] = { id: f.id, name: f.name, folderId };
    const chk = document.getElementById(`check-${f.id}`);
    if (chk) chk.className = 'file-check checked';
  });
  updateSelectedCount();
}

function deselectAllInFolder(fileIds) {
  fileIds.forEach(id => {
    delete selectedFiles[id];
    const chk = document.getElementById(`check-${id}`);
    if (chk) chk.className = 'file-check';
  });
  updateSelectedCount();
}

function updateSelectedCount() {
  const n = Object.keys(selectedFiles).length;
  const el = document.getElementById('selected-count');
  const btn = document.getElementById('btn-start-session');
  el.innerHTML = n === 0 ? 'Nenhum arquivo selecionado' : `<strong>${n}</strong> arquivo${n>1?'s':''} selecionado${n>1?'s':''}`;
  btn.disabled = n === 0;
}

// ═══════════════════════════════════════════════════════

async function showFilters() {
  showScreen('screen-filters');
  const statsEl = document.getElementById('stats-preview');
  statsEl.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando questões...</div>';

  // Load all selected files
  allLoadedQuestions = [];
  const fileIds = Object.keys(selectedFiles);

  for (const fid of fileIds) {
    try {
      const data = await readJsonFile(fid);
      if (Array.isArray(data)) {
        data.forEach(q => { q._fileId = fid; q._fileName = selectedFiles[fid].name; });
        allLoadedQuestions.push(...data);
      }
    } catch (e) {
      showToast(`⚠️ Erro ao ler ${selectedFiles[fid].name}`);
    }
  }

  // Populate filters
  const unique = (arr) => [...new Set(arr.filter(Boolean))].sort();

  const areas = unique(allLoadedQuestions.map(q => q.grande_area));
  const areaEl = document.getElementById('filter-area');
  areaEl.innerHTML = '<option>Todas as Áreas</option>' + areas.map(a => `<option>${escHtml(a)}</option>`).join('');

  const niveis = unique(allLoadedQuestions.map(q => q.nivel_dificuldade));
  const nivelEl = document.getElementById('filter-nivel');
  nivelEl.innerHTML = '<option>Todos os Níveis</option>' + niveis.map(n => `<option>${escHtml(n)}</option>`).join('');

  updateSubArea();
  renderStatsPreview(allLoadedQuestions);
  statsEl.style.display = 'block';
}

function updateSubArea() {
  const area = document.getElementById('filter-area').value;
  const filtered = area === 'Todas as Áreas'
    ? allLoadedQuestions
    : allLoadedQuestions.filter(q => q.grande_area === area);
  const subareas = [...new Set(filtered.map(q => q.sub_area).filter(Boolean))].sort();
  const el = document.getElementById('filter-subarea');
  el.innerHTML = '<option>Todas as Subáreas</option>' + subareas.map(s => `<option>${escHtml(s)}</option>`).join('');
  renderStatsPreview(getFilteredQuestions());
}

function getFilteredQuestions() {
  let q = allLoadedQuestions;
  const area = document.getElementById('filter-area').value;
  const sub = document.getElementById('filter-subarea').value;
  const nivel = document.getElementById('filter-nivel').value;
  const tags = document.getElementById('filter-tags').value.trim().toLowerCase();
  if (area !== 'Todas as Áreas') q = q.filter(x => x.grande_area === area);
  if (sub !== 'Todas as Subáreas') q = q.filter(x => x.sub_area === sub);
  if (nivel !== 'Todos os Níveis') q = q.filter(x => x.nivel_dificuldade === nivel);
  if (tags) q = q.filter(x => tags.split(',').some(t => JSON.stringify(x.tags||'').toLowerCase().includes(t.trim())));
  return q;
}

function calcStats(questions) {
  const hoje = isoToday();
  const s = { novas: 0, erradas: 0, hoje: 0, futuras: 0 };
  questions.forEach(q => {
    const data = q.proxima_revisao;
    const streak = q.streak || 0;
    if (!data) s.novas++;
    else if (data <= hoje) streak === 0 ? s.erradas++ : s.hoje++;
    else s.futuras++;
  });
  return s;
}

function renderStatsPreview(questions) {
  const s = calcStats(questions);
  const total = questions.length;
  const el = document.getElementById('stats-preview');
  el.innerHTML = `
    <h3 class="section-title">Estatísticas (${total} questões)</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center">
        <div style="font-size:1.4rem;font-weight:700;color:var(--orange)">${s.erradas}</div>
        <div style="font-size:0.72rem;color:var(--text2)">🔙 Erradas</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center">
        <div style="font-size:1.4rem;font-weight:700;color:var(--green)">${s.novas}</div>
        <div style="font-size:0.72rem;color:var(--text2)">🌱 Novas</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center">
        <div style="font-size:1.4rem;font-weight:700;color:var(--red)">${s.hoje}</div>

        <div style="font-size:0.72rem;color:var(--text2)">📅 Agendadas</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// SRS LOGIC
// ═══════════════════════════════════════════════════════
function buildQueue(questions) {
  const hoje = isoToday();
  const erradas=[], novas=[], atrasadas=[], paraHoje=[];
  questions.forEach(q => {
    const data = q.proxima_revisao;
    const streak = q.streak || 0;
    if (!data) novas.push(q);
    else if (data <= hoje) {
      if (streak === 0) erradas.push(q);
      else if (data < hoje) atrasadas.push(q);
      else paraHoje.push(q);
    }
  });
  shuffle(erradas); shuffle(novas);
  atrasadas.sort((a,b) => a.proxima_revisao.localeCompare(b.proxima_revisao));
  paraHoje.sort((a,b) => a.proxima_revisao.localeCompare(b.proxima_revisao));
  return [...erradas, ...novas, ...atrasadas, ...paraHoje];
}

// ═══════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════
function startQuiz() {
  sessionQuestions = getFilteredQuestions();
  if (sessionQuestions.length === 0) { showToast('❌ Nenhuma questão com esses filtros'); return; }

  srsMode = document.getElementById('toggle-srs').checked;
  quizQueue = srsMode ? buildQueue(sessionQuestions) : shuffle([...sessionQuestions]);

  if (quizQueue.length === 0) { showToast('✅ Nenhuma questão pendente hoje!'); return; }

  currentIndex = 0;
  sessionCorrect = 0;
  sessionTotal = 0;
  sessionErrors = [];

  showScreen('screen-quiz');
  renderQuestion();
}

// Cache de imagens: nome_do_arquivo → url blob
const imageCache = {};

async function searchImageOnDrive(filename) {
  // Busca o arquivo pelo nome em todo o Drive
  const q = `name='${filename}' and trashed=false and mimeType contains 'image/'`;
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&pageSize=5`;
  const data = await driveGet(url);
  if (data.files && data.files.length > 0) return data.files[0].id;
  return null;
}

async function loadImageAsBlob(fileId) {
  // Baixa a imagem e converte para URL local (blob)
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!r.ok) throw new Error('Erro ao baixar imagem');
  const blob = await r.blob();
  return URL.createObjectURL(blob);
}

async function renderQuestion() {
  if (currentIndex >= quizQueue.length) { finishSession(); return; }

  const q = quizQueue[currentIndex];
  const hoje = isoToday();
  const streak = q.streak || 0;
  const data = q.proxima_revisao;

  // HUD
  const s = calcStats(sessionQuestions);
  document.getElementById('hud').innerHTML = `
    <span class="hud-chip erradas">🔙 ${s.erradas}</span>
    <span class="hud-chip novas">🌱 ${s.novas}</span>
    <span class="hud-chip hoje">⚠️ ${s.hoje}</span>
    <span class="hud-chip futuras">📅 ${s.futuras}</span>`;

  // Progress
  const pct = Math.round((currentIndex / quizQueue.length) * 100);
  document.getElementById('progress-text').textContent = `${currentIndex+1}/${quizQueue.length}`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('score-text').textContent = `${sessionCorrect}✓`;

  // Badge
  let badgeClass = 'nova', badgeText = '🌱 Nova';
  if (data) {
    if (streak === 0) { badgeClass = 'erro'; badgeText = `🔙 Erro recente · 🔥${streak}`; }
    else { badgeClass = 'revisao'; badgeText = `📅 Revisão ${data} · 🔥${streak}`; }
  }

  // Options
  const ops = shuffle([...q.opcoes]);
  const optsHtml = ops.map(op => `
    <button class="option-btn" onclick="checkAnswer(this, '${escStr(op)}')">${escHtml(op)}</button>
  `).join('');

  // Monta o HTML inicial sem imagens ainda
  document.getElementById('quiz-body').innerHTML = `
    <span class="streak-badge ${badgeClass}">${badgeText}</span>
    <div class="question-text">${q.pergunta.replace(/\n/g,'<br>')}</div>
    <div id="image-container"></div>
    <div class="options">${optsHtml}</div>
    <div class="feedback-box" id="feedback-box"></div>`;

  document.getElementById('quiz-actions').innerHTML = `
    <button class="btn btn-danger" style="flex:1" onclick="finishSession()">Encerrar</button>
    <button class="btn btn-primary" style="flex:2;display:none" id="btn-next" onclick="nextQuestion()">Próxima →</button>`;

  // Carrega imagens se existirem
  const imagens = q.imagens || [];
  if (imagens.length > 0) {
    const container = document.getElementById('image-container');
    container.innerHTML = '<div class="loading" style="padding:16px"><div class="spinner"></div>Carregando imagem...</div>';

    for (const caminho of imagens) {
      // Extrai apenas o nome do arquivo do caminho completo
      // Ex: "/content/drive/MyDrive/OGMO/figura.png" → "figura.png"
      const nomeArquivo = caminho.split('/').pop();

      try {
        // Verifica se já está no cache para não baixar de novo
        if (!imageCache[nomeArquivo]) {
          const fileId = await searchImageOnDrive(nomeArquivo);
          if (fileId) {
            imageCache[nomeArquivo] = await loadImageAsBlob(fileId);
          }
        }

        if (imageCache[nomeArquivo]) {
          container.innerHTML = '';
          const img = document.createElement('img');
          img.src = imageCache[nomeArquivo];
          img.style.cssText = 'max-width:100%;border-radius:8px;margin:12px 0;display:block;';
          container.appendChild(img);
        } else {
          container.innerHTML = `<div style="color:var(--text2);font-size:0.8rem;padding:8px">⚠️ Imagem não encontrada: ${escHtml(nomeArquivo)}</div>`;
        }
      } catch(e) {
        container.innerHTML = `<div style="color:var(--red);font-size:0.8rem;padding:8px">❌ Erro ao carregar imagem</div>`;
      }
    }
  }
}

function escStr(s) {
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ');
}

async function checkAnswer(btn, resposta) {
  const q = quizQueue[currentIndex];
  const acertou = resposta === q.resposta_correta;
  sessionTotal++;

  // Disable all
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === q.resposta_correta) b.classList.add('correct');
  });
  if (!acertou) btn.classList.add('wrong');
  else btn.classList.add('correct');

  if (acertou) sessionCorrect++;
  else sessionErrors.push(q);

  // SRS update
  const hoje = getBrazilDate();
  const hojeIso = hoje.toISOString().split('T')[0];
  let msgRev = '';

  if (srsMode) {
    if (acertou) {
      const streak = (q.streak || 0) + 1;
      const dias = {1:1,2:3,3:7,4:15,5:30}[streak] || 45;
      q.streak = streak;
      q.proxima_revisao = addDays(hojeIso, dias);
      msgRev = `Próxima revisão em ${dias} dia${dias>1?'s':''} · ${q.proxima_revisao}`;
    } else {
      q.streak = 0;
      q.proxima_revisao = addDays(hojeIso, 1);
      msgRev = `Agendada para amanhã · ${q.proxima_revisao}`;
    }
    q.respondida = true;
    q.acertou_ultima_vez = acertou;
    q.data_resposta = hoje.toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });

    // Save async
    saveProgress(q);
  }

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.classList.add('show');
  fb.innerHTML = `
    <div class="feedback-result ${acertou ? 'correct' : 'wrong'}">${acertou ? '✅ Correto!' : `❌ Errou! Correta: ${q.resposta_correta}`}</div>
    <div class="feedback-explanation">${(q.explicacao||'').replace(/\n/g,'<br>')}</div>
    ${srsMode ? `<div class="feedback-schedule">📅 ${msgRev}</div>` : '<div class="feedback-schedule">🚫 Modo Livre: progresso não salvo</div>'}`;

  document.getElementById('btn-next').style.display = 'block';
  document.getElementById('score-text').textContent = `${sessionCorrect}✓`;
}

function nextQuestion() {
  currentIndex++;
  window.scrollTo(0, 0);
  renderQuestion();
}

async function saveProgress(q) {
  try {
    const fileId = q._fileId;
    if (!fileId) return;
    const data = await readJsonFile(fileId);
    const idx = data.findIndex(x => x.id === q.id);
    if (idx >= 0) {
      data[idx].respondida = q.respondida;
      data[idx].acertou_ultima_vez = q.acertou_ultima_vez;
      data[idx].streak = q.streak;
      data[idx].proxima_revisao = q.proxima_revisao;
      data[idx].data_resposta = q.data_resposta;
      await driveUpdate(fileId, data);
    }
  } catch (e) {
    console.error('Save error:', e);
    showToast('⚠️ Erro ao salvar progresso');
  }
}

// ═══════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════
function finishSession() {
  showScreen('screen-results');
  const pct = sessionTotal > 0 ? Math.round((sessionCorrect/sessionTotal)*100) : 0;
  document.getElementById('results-score').textContent = pct + '%';
  document.getElementById('results-label').textContent =
    `${sessionCorrect} acertos de ${sessionTotal} questões respondidas`;

  let errHtml = '';
  if (sessionErrors.length > 0) {
    errHtml = `<h3 class="section-title" style="margin-top:0">🔻 Revisão de Erros</h3>`;
    sessionErrors.forEach((q, i) => {
      errHtml += `
        <div class="error-card">
          <div class="error-q">${i+1}. ${q.pergunta.replace(/\n/g,'<br>')}</div>
          <div class="error-answer">✅ ${q.resposta_correta}</div>
          <div class="error-expl">${(q.explicacao||'').replace(/\n/g,'<br>')}</div>
        </div>`;
    });
  } else if (sessionTotal > 0) {
    errHtml = `<div style="text-align:center;padding:32px;color:var(--green);font-size:1rem">✨ Nenhum erro nesta sessão!</div>`;
  }
  document.getElementById('results-errors').innerHTML = errHtml;
}
</script>
